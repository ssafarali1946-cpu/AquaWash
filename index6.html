<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./input.css" />
    <link rel="stylesheet" href="./output.css" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./imeges/image.png" />
    <link rel="stylesheet" href="./script.js" />
    <title>AquaWash | Premium Car Care</title>
  </head>

  <body class="bg-blue-950">
    <header
      class="fixed top-0 left-0 w-full flex items-center justify-between px-6 py-4 backdrop-blur-xl border-b border-white/15 z-50 shadow-[0_8px_32px_0_rgba(0,200,255,0.1)]"
    >
      <div class="flex items-center gap-4">
        <img class="w-10" src="./imeges/droplet.svg" alt="" />
        <h1 class="text-blue-500 text-3xl font-bold">AquaWash</h1>
      </div>

      <ul class="hidden md:flex gap-8">
        <li>
          <a
            class="text-blue-400 hover:text-white font-bold"
            href="./index.html"
            >Home</a
          >
        </li>
        <li>
          <a class="text-blue-400 font-bold" href="./index1.html">Services</a>
        </li>
        <li>
          <a
            class="text-blue-400 hover:text-white font-bold"
            href="./index2.html"
            >Gallery</a
          >
        </li>
        <li>
          <a
            class="text-blue-400 hover:text-white font-bold"
            href="./index3.html"
            >Pricing</a
          >
        </li>
        <li>
          <a
            class="text-blue-400 hover:text-white font-bold"
            href="./index4.html"
            >Booking</a
          >
        </li>
        <li>
          <a
            class="text-blue-400 hover:text-white font-bold animate-pulse"
            href="./index5.html"
            >Registration</a
          >
        </li>
      </ul>
      <button
        class="hidden md:block font-bold text-blue-200 border-2 border-blue-500 px-5 py-2 rounded-3xl bg-blue-500 hover:bg-blue-800 hover:text-white transition"
      >
        BOOK NOW
      </button>

      <button id="menuBtn" class="md:hidden">
        <img src="./imeges/menu (1).svg" class="w-8" alt="" />
      </button>
    </header>
    <div
      id="overlay"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm opacity-0 invisible transition duration-300 z-40"
    ></div>
    <div
      id="mobileMenu"
      class="fixed top-0 right-0 h-full w-80 bg-white/10 backdrop-blur-3xl border-l border-white/20 shadow-2xl translate-x-full transition-transform duration-500 ease-in-out z-50"
    >
      <div
        class="flex items-center justify-between p-6 border-b border-white/20"
      >
        <h1 class="text-cyan-400 font-bold text-2xl">AquaWash</h1>

        <button
          id="closeBtn"
          class="text-white text-4xl hover:rotate-90 duration-300"
        >
          &times;
        </button>
      </div>

      <ul class="flex flex-col gap-4 p-6">
        <a
          class="p-4 rounded-2xl bg-white/5 text-white font-bold hover:bg-cyan-500 hover:translate-x-2 duration-300"
          href="./index.html"
        >
          🏠 Home
        </a>

        <a
          class="p-4 rounded-2xl bg-white/5 text-white font-bold hover:bg-cyan-500 hover:translate-x-2 duration-300"
          href="./index1.html"
        >
          🚗 Services
        </a>

        <a
          class="p-4 rounded-2xl bg-white/5 text-white font-bold hover:bg-cyan-500 hover:translate-x-2 duration-300"
          href="./index2.html"
        >
          🚘 Gallery
        </a>

        <a
          class="p-4 rounded-2xl bg-white/5 text-white font-bold hover:bg-cyan-500 hover:translate-x-2 duration-300"
          href="./index3.html"
        >
          💰 Pricing
        </a>

        <a
          class="p-4 rounded-2xl bg-white/5 text-white font-bold hover:bg-cyan-500 hover:translate-x-2 duration-300"
          href="/index4.html"
        >
          ℹ Booking
        </a>
        <a
          class="p-4 rounded-2xl bg-white/5 text-white font-bold hover:bg-cyan-500 hover:translate-x-2 duration-300"
          href="/index4.html"
          href=""
          >Registration
        </a>
      </ul>

      <div class="px-6 mt-6">
        <button
          class="w-full py-4 rounded-full bg-blue-500 from-cyan-500 to-blue-600 text-white font-bold hover:scale-105 transition"
        >
          BOOK NOW
        </button>
      </div>
    </div>
    <script>
      const menuBtn = document.getElementById("menuBtn");
      const closeBtn = document.getElementById("closeBtn");
      const mobileMenu = document.getElementById("mobileMenu");
      const overlay = document.getElementById("overlay");

      menuBtn.addEventListener("click", () => {
        mobileMenu.classList.remove("translate-x-full");
        overlay.classList.remove("opacity-0", "invisible");
      });

      function closeMenu() {
        mobileMenu.classList.add("translate-x-full");
        overlay.classList.add("opacity-0", "invisible");
      }

      closeBtn.addEventListener("click", closeMenu);
      overlay.addEventListener("click", closeMenu);
    </script>
    <section>
      
    </section>
  </body>
</html>
